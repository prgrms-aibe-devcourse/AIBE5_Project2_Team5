# Datasource
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:test
spring.datasource.username=sa
spring.datasource.password=

# H2 DataBase
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? ? ??? ??, ?? ? ??
spring.jpa.hibernate.ddl-auto=create-drop

# SQL ?? (????)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Test-only auth defaults
jwt.secret=pickxel-test-secret-key-change-me-2026
jwt.access-token-expiration-millis=3600000
app.oauth2.success-redirect-uri=http://127.0.0.1:5173/oauth2/redirect
app.websocket.container.enabled=false

# Test-only mail defaults
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=

# Test-only OAuth2 defaults
spring.security.oauth2.client.registration.google.client-id=google-client-id
spring.security.oauth2.client.registration.google.client-secret=google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.kakao.client-id=kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=kakao-client-secret
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
