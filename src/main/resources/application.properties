spring.application.name=pixel_Project2
spring.config.import=optional:file:.env[.properties]

# Oracle ???? ??
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@175.126.145.185:1521:orcl
spring.datasource.username=aibe5team5
spring.datasource.password=akstp

# JPA/Hibernate 설정 (Oracle 11g는 legacy dialect가 필요)
spring.jpa.database-platform=org.hibernate.community.dialect.OracleLegacyDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# JWT (development default; override with environment variables in production)
jwt.secret=${JWT_SECRET:pickxel-local-development-secret-key-change-me-2026}
jwt.access-token-expiration-millis=${JWT_ACCESS_TOKEN_EXPIRATION_MILLIS:3600000}

# OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
app.oauth2.success-redirect-uri=${OAUTH2_SUCCESS_REDIRECT_URI:http://127.0.0.1:5173/oauth2/redirect}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Password reset
app.frontend-base-url=${FRONTEND_BASE_URL:http://127.0.0.1:5173}
app.password-reset-token-expiration-minutes=${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
